function getParameterByName(name, url) {
    if (!url) url = window.location.href;
    name = name.replace(/[\[\]]/g, '\\$&');
    var regex = new RegExp('[?&]' + name + '(=([^&#]*)|&|#|$)'),
        results = regex.exec(url);
    if (!results) return null;
    if (!results[2]) return '';
    return decodeURIComponent(results[2].replace(/\+/g, ' '));
}

var year = getParameterByName('year');
var monthday = getParameterByName('monthday');
var month = monthday.substring(0, 2);
var day = monthday.substring(2, 4);
var url = "https://chat.google.com/u/1/app/search?q=&cfrom=mehmet.dagnilak@alfayazilim.com&cdateoption=custom&cdatestart="+year+"-"+month+"-"+day+"&cdateend="+year+"-"+month+"-"+(parseInt(day)+1)+"&csortop=1";
console.log(url);
location.href = url;
</script>
